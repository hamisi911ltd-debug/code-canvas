  <text x="68" y="520" font-family="ui-monospace,Consolas,monospace" font-size="11.5" fill="#484f58">// your AI co-pilot is ready_</text>

  <!-- ═══ RIGHT PANEL: AI CHAT ═══ -->
  <rect x="462" y="20" width="418" height="520" rx="12" fill="url(#panelR)" stroke="#30363d" stroke-width="1"/>

  <!-- Chat title bar -->
  <rect x="462" y="20" width="418" height="38" rx="12" fill="#1a1f2e"/>
  <rect x="462" y="44" width="418" height="14" fill="#1a1f2e"/>

  <!-- Model indicator -->
  <rect x="476" y="26" width="82" height="22" rx="11" fill="#00e5a0" fill-opacity="0.12" stroke="#00e5a0" stroke-width="0.8"/>
  <circle cx="490" cy="37" r="4" fill="#00e5a0"/>
  <text x="500" y="41" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10.5" font-weight="700" fill="#00e5a0">Claude AI</text>
  <text x="576" y="41" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10.5" fill="#8b949e">VibeLearn Assistant</text>

  <!-- Chat bubble 1: user -->
  <rect x="494" y="66" width="368" height="54" rx="10" fill="#00e5a0" fill-opacity="0.1" stroke="#00e5a0" stroke-width="0.6"/>
  <text x="510" y="85" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="700" fill="#00e5a0">You</text>
  <text x="510" y="102" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#c9d1d9">Build me a React + AI chat app</text>
  <text x="510" y="116" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#c9d1d9">with streaming responses</text>

  <!-- Chat bubble 2: Claude -->
  <rect x="462" y="132" width="368" height="112" rx="10" fill="#21262d" stroke="#30363d" stroke-width="0.8"/>
  <!-- Claude icon -->
  <circle cx="482" cy="150" r="12" fill="#00e5a0" fill-opacity="0.15" stroke="#00e5a0" stroke-width="0.8"/>
  <text x="476" y="154" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">&#10024;</text>
  <text x="502" y="153" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="700" fill="#00e5a0">Claude</text>
  <line x1="462" y1="163" x2="830" y2="163" stroke="#30363d" stroke-width="0.7"/>
  <text x="476" y="180" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#c9d1d9">Sure! Here's your streaming chat app:</text>
  <text x="476" y="200" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11.5" fill="#7ee787">&#10003; useChat hook configured</text>
  <text x="476" y="218" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11.5" fill="#7ee787">&#10003; Real-time token streaming</text>
  <text x="476" y="236" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11.5" fill="#7ee787">&#10003; Tailwind dark-mode UI ready</text>

  <!-- Chat bubble 3: user -->
  <rect x="532" y="256" width="298" height="38" rx="10" fill="#00e5a0" fill-opacity="0.1" stroke="#00e5a0" stroke-width="0.6"/>
  <text x="548" y="278" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#c9d1d9">Now add auth with JWT tokens</text>

  <!-- Chat bubble 4: Claude code -->
  <rect x="462" y="306" width="368" height="130" rx="10" fill="#21262d" stroke="#30363d" stroke-width="0.8"/>
  <text x="476" y="323" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="700" fill="#00e5a0">&#10024; Claude</text>
  <text x="476" y="340" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11.5" fill="#c9d1d9">Here's the auth middleware:</text>
  <!-- Code block -->
  <rect x="476" y="348" width="340" height="78" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="0.8"/>
  <text x="490" y="367" font-family="ui-monospace,Consolas,monospace" font-size="11"><tspan fill="#ff7b72">export</tspan><tspan fill="#c9d1d9"> </tspan><tspan fill="#ff7b72">async function</tspan><tspan fill="#d2a8ff"> auth</tspan><tspan fill="#c9d1d9">(req) {</tspan></text>
  <text x="490" y="384" font-family="ui-monospace,Consolas,monospace" font-size="11"><tspan fill="#ffa657">  const</tspan><tspan fill="#79c0ff"> token</tspan><tspan fill="#c9d1d9"> = req.headers.</tspan><tspan fill="#79c0ff">get</tspan><tspan fill="#c9d1d9">(</tspan><tspan fill="#a5d6ff">'auth'</tspan><tspan fill="#c9d1d9">)</tspan></text>
  <text x="490" y="401" font-family="ui-monospace,Consolas,monospace" font-size="11"><tspan fill="#ffa657">  const</tspan><tspan fill="#79c0ff"> user</tspan><tspan fill="#c9d1d9"> = </tspan><tspan fill="#ff7b72">await</tspan><tspan fill="#d2a8ff"> verifyJWT</tspan><tspan fill="#c9d1d9">(token)</tspan></text>
  <text x="490" y="418" font-family="ui-monospace,Consolas,monospace" font-size="11"><tspan fill="#ff7b72">  if</tspan><tspan fill="#c9d1d9"> (!</tspan><tspan fill="#79c0ff">user</tspan><tspan fill="#c9d1d9">) </tspan><tspan fill="#ff7b72">throw</tspan><tspan fill="#c9d1d9"> </tspan><tspan fill="#d2a8ff">unauthorized</tspan><tspan fill="#c9d1d9">()</tspan></text>
  <text x="490" y="420" font-family="ui-monospace,Consolas,monospace" font-size="11"><tspan fill="#c9d1d9">}</tspan></text>

  <!-- Typing indicator -->
  <rect x="462" y="448" width="90" height="30" rx="15" fill="#21262d" stroke="#30363d" stroke-width="0.7"/>
  <circle cx="485" cy="463" r="4" fill="#6e7681"/>
  <circle cx="501" cy="463" r="4" fill="#6e7681"/>
  <circle cx="517" cy="463" r="4" fill="#6e7681"/>

  <!-- Input bar -->
  <rect x="462" y="490" width="418" height="40" rx="10" fill="#21262d" stroke="#30363d" stroke-width="0.8"/>
  <text x="480" y="514" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#484f58">Ask Claude to build anything...</text>
  <!-- Send button -->
  <rect x="846" y="496" width="28" height="28" rx="7" fill="#00e5a0"/>
  <text x="853" y="514" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" font-weight="700" fill="#0d1117">&#8593;</text>

  <!-- Status bar -->
  <text x="462" y="544" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#3d444d">claude-sonnet-4  &#183;  streaming enabled</text>
  <circle cx="792" cy="540" r="3" fill="#28c840"/>
  <text x="800" y="544" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#28c840">live</text>

  <!-- Center glow separator -->
  <rect x="449" y="20" width="10" height="520" rx="5" fill="#00e5a0" fill-opacity="0.04"/>
  <line x1="454" y1="40" x2="454" y2="520" stroke="#00e5a0" stroke-width="0.5" stroke-opacity="0.3"/>

</svg>
