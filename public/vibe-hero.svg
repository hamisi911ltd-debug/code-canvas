  <rect width="900" height="560" fill="url(#glow2)"/>

  <!-- Grid pattern dots -->
  <g opacity="0.08" fill="#ffffff">
    <rect x="80" y="40" width="1.5" height="1.5" rx="1"/><rect x="120" y="40" width="1.5" height="1.5" rx="1"/><rect x="160" y="40" width="1.5" height="1.5" rx="1"/><rect x="200" y="40" width="1.5" height="1.5" rx="1"/><rect x="240" y="40" width="1.5" height="1.5" rx="1"/><rect x="280" y="40" width="1.5" height="1.5" rx="1"/><rect x="320" y="40" width="1.5" height="1.5" rx="1"/><rect x="360" y="40" width="1.5" height="1.5" rx="1"/><rect x="400" y="40" width="1.5" height="1.5" rx="1"/><rect x="440" y="40" width="1.5" height="1.5" rx="1"/><rect x="480" y="40" width="1.5" height="1.5" rx="1"/><rect x="520" y="40" width="1.5" height="1.5" rx="1"/><rect x="560" y="40" width="1.5" height="1.5" rx="1"/><rect x="600" y="40" width="1.5" height="1.5" rx="1"/><rect x="640" y="40" width="1.5" height="1.5" rx="1"/><rect x="680" y="40" width="1.5" height="1.5" rx="1"/><rect x="720" y="40" width="1.5" height="1.5" rx="1"/>
    <rect x="80" y="80" width="1.5" height="1.5" rx="1"/><rect x="120" y="80" width="1.5" height="1.5" rx="1"/><rect x="160" y="80" width="1.5" height="1.5" rx="1"/><rect x="200" y="80" width="1.5" height="1.5" rx="1"/><rect x="240" y="80" width="1.5" height="1.5" rx="1"/><rect x="280" y="80" width="1.5" height="1.5" rx="1"/><rect x="320" y="80" width="1.5" height="1.5" rx="1"/><rect x="360" y="80" width="1.5" height="1.5" rx="1"/><rect x="400" y="80" width="1.5" height="1.5" rx="1"/><rect x="440" y="80" width="1.5" height="1.5" rx="1"/>
  </g>

  <!-- ═══ LEFT PANEL: CODE EDITOR ═══ -->
  <rect x="20" y="20" width="430" height="520" rx="12" fill="url(#panelL)" stroke="#30363d" stroke-width="1"/>

  <!-- Editor title bar -->
  <rect x="20" y="20" width="430" height="38" rx="12" fill="#21262d"/>
  <rect x="20" y="44" width="430" height="14" fill="#21262d"/>
  <!-- Dots -->
  <circle cx="44" cy="39" r="5.5" fill="#ff5f57"/>
  <circle cx="63" cy="39" r="5.5" fill="#ffbd2e"/>
  <circle cx="82" cy="39" r="5.5" fill="#28c840"/>
  <!-- Tab -->
  <rect x="104" y="24" width="110" height="26" rx="5" fill="#0d1117" stroke="#444c56" stroke-width="0.8"/>
  <circle cx="118" cy="37" r="4" fill="#28c840"/>
  <text x="128" y="41" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#c9d1d9">App.tsx</text>

  <!-- Line numbers bg -->
  <rect x="20" y="58" width="34" height="482" fill="#0d1117"/>
  <rect x="54" y="58" width="1" height="482" fill="#21262d"/>

  <!-- Code lines - carefully crafted -->
  <g font-family="ui-monospace,Consolas,monospace" font-size="12">
    <!-- Line numbers -->
    <g fill="#484f58" font-size="11" text-anchor="end">
      <text x="46" y="80">1</text><text x="46" y="98">2</text><text x="46" y="116">3</text>
      <text x="46" y="134">4</text><text x="46" y="152">5</text><text x="46" y="170">6</text>
      <text x="46" y="188">7</text><text x="46" y="206">8</text><text x="46" y="224">9</text>
      <text x="46" y="242">10</text><text x="46" y="260">11</text><text x="46" y="278">12</text>
      <text x="46" y="296">13</text><text x="46" y="314">14</text><text x="46" y="332">15</text>
      <text x="46" y="350">16</text><text x="46" y="368">17</text><text x="46" y="386">18</text>
      <text x="46" y="404">19</text><text x="46" y="422">20</text><text x="46" y="440">21</text>
    </g>

    <!-- L1: import react -->
    <text x="62" y="80"><tspan fill="#ff7b72">import</tspan><tspan fill="#c9d1d9"> { useState } </tspan><tspan fill="#ff7b72">from</tspan><tspan fill="#a5d6ff"> 'react'</tspan></text>
    <!-- L2: import ai -->
    <text x="62" y="98"><tspan fill="#ff7b72">import</tspan><tspan fill="#c9d1d9"> { generateAI } </tspan><tspan fill="#ff7b72">from</tspan><tspan fill="#a5d6ff"> '@ai/core'</tspan></text>
    <!-- L3: blank -->
    <!-- L4: type -->
    <text x="62" y="134"><tspan fill="#ffa657">type</tspan><tspan fill="#79c0ff"> Message</tspan><tspan fill="#c9d1d9"> = { </tspan><tspan fill="#79c0ff">role</tspan><tspan fill="#c9d1d9">: </tspan><tspan fill="#a5d6ff">'user'</tspan><tspan fill="#c9d1d9"> | </tspan><tspan fill="#a5d6ff">'ai'</tspan><tspan fill="#c9d1d9">; </tspan><tspan fill="#79c0ff">text</tspan><tspan fill="#c9d1d9">: </tspan><tspan fill="#ffa657">string</tspan><tspan fill="#c9d1d9"> }</tspan></text>
    <!-- L5: blank -->
    <!-- L6: export function -->
    <text x="62" y="170"><tspan fill="#ff7b72">export default function</tspan><tspan fill="#d2a8ff"> VibeCoder</tspan><tspan fill="#c9d1d9">() {</tspan></text>
    <!-- L7: useState -->
    <text x="78" y="188"><tspan fill="#ffa657">const</tspan><tspan fill="#c9d1d9"> [</tspan><tspan fill="#79c0ff">msgs</tspan><tspan fill="#c9d1d9">, </tspan><tspan fill="#79c0ff">setMsgs</tspan><tspan fill="#c9d1d9">] = </tspan><tspan fill="#d2a8ff">useState</tspan><tspan fill="#c9d1d9">&lt;</tspan><tspan fill="#79c0ff">Message</tspan><tspan fill="#c9d1d9">[]&gt;([])</tspan></text>
    <!-- L8: input state -->
    <text x="78" y="206"><tspan fill="#ffa657">const</tspan><tspan fill="#c9d1d9"> [</tspan><tspan fill="#79c0ff">input</tspan><tspan fill="#c9d1d9">, </tspan><tspan fill="#79c0ff">setInput</tspan><tspan fill="#c9d1d9">] = </tspan><tspan fill="#d2a8ff">useState</tspan><tspan fill="#c9d1d9">('')</tspan></text>
    <!-- L9: blank -->
    <!-- L10: async fn -->
    <text x="78" y="242"><tspan fill="#ffa657">const</tspan><tspan fill="#79c0ff"> handleAI</tspan><tspan fill="#c9d1d9"> = </tspan><tspan fill="#ff7b72">async</tspan><tspan fill="#c9d1d9"> () =&gt; {</tspan></text>
    <!-- L11: await call -->
    <text x="94" y="260"><tspan fill="#ffa657">const</tspan><tspan fill="#79c0ff"> res</tspan><tspan fill="#c9d1d9"> = </tspan><tspan fill="#ff7b72">await</tspan><tspan fill="#d2a8ff"> generateAI</tspan><tspan fill="#c9d1d9">({ </tspan><tspan fill="#79c0ff">prompt</tspan><tspan fill="#c9d1d9">: </tspan><tspan fill="#79c0ff">input</tspan><tspan fill="#c9d1d9"> })</tspan></text>
    <!-- L12: setMsgs -->
    <text x="94" y="278"><tspan fill="#d2a8ff">setMsgs</tspan><tspan fill="#c9d1d9">(p =&gt; [...p, { </tspan><tspan fill="#79c0ff">role</tspan><tspan fill="#c9d1d9">:</tspan><tspan fill="#a5d6ff">'ai'</tspan><tspan fill="#c9d1d9">, </tspan><tspan fill="#79c0ff">text</tspan><tspan fill="#c9d1d9">:</tspan><tspan fill="#79c0ff">res</tspan><tspan fill="#c9d1d9"> }])</tspan></text>
    <!-- L13: close fn -->
    <text x="78" y="296"><tspan fill="#c9d1d9">}</tspan></text>
    <!-- L14: blank -->
    <!-- L15: return -->
    <text x="78" y="332"><tspan fill="#ff7b72">return</tspan><tspan fill="#c9d1d9"> (</tspan></text>
    <!-- L16: div -->
    <text x="94" y="350"><tspan fill="#79c0ff">&lt;div</tspan><tspan fill="#ffa657"> className</tspan><tspan fill="#c9d1d9">=</tspan><tspan fill="#a5d6ff">"vibe-app"</tspan><tspan fill="#79c0ff">&gt;</tspan></text>
    <!-- L17: ChatWindow -->
    <text x="110" y="368"><tspan fill="#79c0ff">&lt;ChatWindow</tspan><tspan fill="#ffa657"> messages</tspan><tspan fill="#c9d1d9">={</tspan><tspan fill="#79c0ff">msgs</tspan><tspan fill="#c9d1d9">} /&gt;</tspan></text>
    <!-- L18: PromptBar -->
    <text x="110" y="386"><tspan fill="#79c0ff">&lt;PromptBar</tspan><tspan fill="#ffa657"> onSend</tspan><tspan fill="#c9d1d9">={</tspan><tspan fill="#79c0ff">handleAI</tspan><tspan fill="#c9d1d9">} /&gt;</tspan></text>
    <!-- L19: /div -->
    <text x="94" y="404"><tspan fill="#79c0ff">&lt;/div&gt;</tspan></text>
    <!-- L20: close return -->
    <text x="78" y="422"><tspan fill="#c9d1d9">)</tspan></text>
    <!-- L21: close function -->
    <text x="62" y="440"><tspan fill="#c9d1d9">}</tspan></text>
  </g>

  <!-- AI autocomplete popup -->
  <rect x="64" y="454" width="300" height="52" rx="6" fill="#1c2333" stroke="#388bfd" stroke-width="1"/>
  <rect x="64" y="454" width="300" height="18" rx="6" fill="#388bfd" fill-opacity="0.15"/>
  <rect x="64" y="466" width="300" height="6" fill="#1c2333"/>
  <text x="74" y="467" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#388bfd">&#9889; AI suggestion — Tab to accept</text>
  <text x="74" y="487" font-family="ui-monospace,Consolas,monospace" font-size="11.5" fill="#7ee787">  const</text>
  <text x="118" y="487" font-family="ui-monospace,Consolas,monospace" font-size="11.5" fill="#79c0ff"> stream</text>
  <text x="160" y="487" font-family="ui-monospace,Consolas,monospace" font-size="11.5" fill="#c9d1d9"> = </text>
  <text x="176" y="487" font-family="ui-monospace,Consolas,monospace" font-size="11.5" fill="#ff7b72">await</text>
  <text x="214" y="487" font-family="ui-monospace,Consolas,monospace" font-size="11.5" fill="#d2a8ff"> ai.stream</text>
  <text x="278" y="487" font-family="ui-monospace,Consolas,monospace" font-size="11.5" fill="#c9d1d9">(input)</text>

  <!-- Cursor -->
