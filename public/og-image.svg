<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1520"/>
      <stop offset="60%" stop-color="#0d1f2d"/>
      <stop offset="100%" stop-color="#091219"/>
    </linearGradient>
    <linearGradient id="mg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4a8"/>
      <stop offset="100%" stop-color="#73ffb8"/>
    </linearGradient>
    <radialGradient id="glow-bg" cx="30%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#2dd4a8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2dd4a8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-bg)"/>

  <!-- Grid pattern dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#2dd4a8" opacity="0.12"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Left logo icon -->
  <g transform="translate(80, 195)">
    <!-- Circle bg -->
    <circle cx="120" cy="120" r="120" fill="#122d3d" opacity="0.9"/>
    <circle cx="120" cy="120" r="115" fill="none" stroke="url(#mg)" stroke-width="2.5" opacity="0.5"/>
    <!-- V shape -->
    <line x1="40" y1="42" x2="120" y2="180" stroke="url(#mg)" stroke-width="22" stroke-linecap="round" filter="url(#glow)"/>
    <line x1="120" y1="180" x2="200" y2="42" stroke="url(#mg)" stroke-width="22" stroke-linecap="round" filter="url(#glow)"/>
    <circle cx="120" cy="180" r="7" fill="#73ffb8" opacity="0.9"/>
    <!-- Sparkle -->
    <path d="M185,55 L188,62 L195,65 L188,68 L185,75 L182,68 L175,65 L182,62 Z" fill="#73ffb8" opacity="0.9"/>
  </g>

  <!-- Brand name -->
  <text x="295" y="268" font-family="'Space Grotesk','Segoe UI',sans-serif" font-weight="800" font-size="86" letter-spacing="-2" fill="white">VIBE</text>
  <text x="295" y="355" font-family="'Space Grotesk','Segoe UI',sans-serif" font-weight="800" font-size="86" letter-spacing="-2">
    <tspan fill="url(#mg)">LEARN</tspan>
  </text>

  <!-- Tagline -->
  <text x="295" y="410" font-family="'DM Sans','Segoe UI',sans-serif" font-weight="400" font-size="28" fill="#8fbdad" letter-spacing="0.5">Build real apps. Learn with AI. Ship something today.</text>

  <!-- Feature pills -->
  <g transform="translate(295, 450)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="190" height="40" rx="20" fill="#2dd4a8" fill-opacity="0.12" stroke="#2dd4a8" stroke-width="1.5" stroke-opacity="0.4"/>
    <text x="95" y="26" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="16" fill="#73ffb8">React &amp; TypeScript</text>
    <!-- Pill 2 -->
    <rect x="205" y="0" width="165" height="40" rx="20" fill="#2dd4a8" fill-opacity="0.12" stroke="#2dd4a8" stroke-width="1.5" stroke-opacity="0.4"/>
    <text x="287" y="26" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="16" fill="#73ffb8">AI Coding</text>
    <!-- Pill 3 -->
    <rect x="385" y="0" width="155" height="40" rx="20" fill="#2dd4a8" fill-opacity="0.12" stroke="#2dd4a8" stroke-width="1.5" stroke-opacity="0.4"/>
    <text x="462" y="26" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="16" fill="#73ffb8">Certificates</text>
    <!-- Pill 4 -->
    <rect x="555" y="0" width="155" height="40" rx="20" fill="#2dd4a8" fill-opacity="0.12" stroke="#2dd4a8" stroke-width="1.5" stroke-opacity="0.4"/>
    <text x="632" y="26" text-anchor="middle" font-family="'DM Sans',sans-serif" font-size="16" fill="#73ffb8">Free to Start</text>
  </g>

  <!-- Right decorative V (large faded) -->
  <g opacity="0.05">
    <line x1="900" y1="50" x2="1100" y2="550" stroke="#2dd4a8" stroke-width="80" stroke-linecap="round"/>
    <line x1="1100" y1="550" x2="1180" y2="50" stroke="#2dd4a8" stroke-width="80" stroke-linecap="round"/>
  </g>

  <!-- Bottom border line -->
  <rect x="0" y="618" width="1200" height="12" rx="0" fill="url(#mg)" opacity="0.6"/>
</svg>
